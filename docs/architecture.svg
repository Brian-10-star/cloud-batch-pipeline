<svg width="100%" viewBox="0 0 680 340" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Cloud Batch Pipeline Architecture</title>
  <desc>Six-step data pipeline: Data Generator to S3 via LocalStack, then Extract, Transform, Load into PostgreSQL, then SQL Analytics.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; fill: #1a1a1a; }
      .label { font-size: 11px; fill: #555; }
      .title { font-size: 13px; font-weight: 600; }
      .sub   { font-size: 11px; fill: #666; }
      .stat  { font-size: 12px; font-weight: 600; }
      .section { font-size: 11px; fill: #888; }
      .divider { stroke: #ddd; stroke-width: 0.8; }
      .arr { stroke: #aaa; stroke-width: 1.2; fill: none; }
    </style>
  </defs>

  <!-- Step labels -->
  <text class="label" x="56"  y="36" text-anchor="middle">1. Generate</text>
  <text class="label" x="172" y="36" text-anchor="middle">2. Upload</text>
  <text class="label" x="288" y="36" text-anchor="middle">3. Extract</text>
  <text class="label" x="404" y="36" text-anchor="middle">4. Transform</text>
  <text class="label" x="520" y="36" text-anchor="middle">5. Load</text>
  <text class="label" x="624" y="36" text-anchor="middle">6. Analyse</text>

  <!-- Node 1: Data Generator (teal) -->
  <rect x="10" y="50" width="92" height="64" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text class="title" x="56" y="76"  text-anchor="middle" fill="#085041">Data</text>
  <text class="title" x="56" y="92"  text-anchor="middle" fill="#085041">Generator</text>
  <text class="sub"   x="56" y="108" text-anchor="middle" fill="#0F6E56">Python / Faker</text>

  <!-- Arrow 1→2 -->
  <line x1="102" y1="82" x2="126" y2="82" class="arr" marker-end="url(#arrow)"/>

  <!-- Node 2: S3 Bucket (amber) -->
  <rect x="126" y="50" width="92" height="64" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text class="title" x="172" y="72"  text-anchor="middle" fill="#633806">S3 Bucket</text>
  <text class="sub"   x="172" y="90"  text-anchor="middle" fill="#854F0B">LocalStack</text>
  <text class="sub"   x="172" y="106" text-anchor="middle" fill="#854F0B">port 4566</text>

  <!-- Arrow 2→3 -->
  <line x1="218" y1="82" x2="242" y2="82" class="arr" marker-end="url(#arrow)"/>

  <!-- Node 3: Extract (blue) -->
  <rect x="242" y="50" width="92" height="64" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text class="title" x="288" y="72"  text-anchor="middle" fill="#0C447C">Extract</text>
  <text class="sub"   x="288" y="90"  text-anchor="middle" fill="#185FA5">boto3</text>
  <text class="sub"   x="288" y="106" text-anchor="middle" fill="#185FA5">StringIO</text>

  <!-- Arrow 3→4 -->
  <line x1="334" y1="82" x2="358" y2="82" class="arr" marker-end="url(#arrow)"/>

  <!-- Node 4: Transform (purple) -->
  <rect x="358" y="50" width="92" height="64" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text class="title" x="404" y="72"  text-anchor="middle" fill="#3C3489">Transform</text>
  <text class="sub"   x="404" y="90"  text-anchor="middle" fill="#534AB7">pandas</text>
  <text class="sub"   x="404" y="106" text-anchor="middle" fill="#534AB7">clean + enrich</text>

  <!-- Arrow 4→5 -->
  <line x1="450" y1="82" x2="474" y2="82" class="arr" marker-end="url(#arrow)"/>

  <!-- Node 5: Warehouse (coral) -->
  <rect x="474" y="50" width="92" height="64" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
  <text class="title" x="520" y="72"  text-anchor="middle" fill="#712B13">Warehouse</text>
  <text class="sub"   x="520" y="90"  text-anchor="middle" fill="#993C1D">PostgreSQL</text>
  <text class="sub"   x="520" y="106" text-anchor="middle" fill="#993C1D">port 5439</text>

  <!-- Arrow 5→6 -->
  <line x1="566" y1="82" x2="590" y2="82" class="arr" marker-end="url(#arrow)"/>

  <!-- Node 6: Analytics (green) -->
  <rect x="590" y="50" width="80" height="64" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.8"/>
  <text class="title" x="630" y="72"  text-anchor="middle" fill="#27500A">SQL</text>
  <text class="title" x="630" y="88"  text-anchor="middle" fill="#27500A">Analytics</text>
  <text class="sub"   x="630" y="106" text-anchor="middle" fill="#3B6D11">psycopg2</text>

  <!-- Divider 1 -->
  <line x1="40" y1="146" x2="640" y2="146" class="divider"/>
  <text class="section" x="340" y="163" text-anchor="middle">Infrastructure</text>

  <!-- Infra: Docker Compose -->
  <rect x="40" y="174" width="160" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text class="title" x="120" y="196" text-anchor="middle" fill="#2C2C2A">Docker Compose</text>
  <text class="sub"   x="120" y="214" text-anchor="middle" fill="#5F5E5A">2 containers</text>

  <!-- Infra: LocalStack -->
  <rect x="218" y="174" width="140" height="52" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text class="title" x="288" y="196" text-anchor="middle" fill="#633806">LocalStack 3.4</text>
  <text class="sub"   x="288" y="214" text-anchor="middle" fill="#854F0B">S3 simulation</text>

  <!-- Infra: PostgreSQL -->
  <rect x="376" y="174" width="152" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
  <text class="title" x="452" y="196" text-anchor="middle" fill="#712B13">PostgreSQL 16</text>
  <text class="sub"   x="452" y="214" text-anchor="middle" fill="#993C1D">Redshift-compatible</text>

  <!-- Infra: Python -->
  <rect x="546" y="174" width="94" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text class="title" x="593" y="196" text-anchor="middle" fill="#085041">Python 3.13</text>
  <text class="sub"   x="593" y="214" text-anchor="middle" fill="#0F6E56">ETL scripts</text>

  <!-- Divider 2 -->
  <line x1="40" y1="248" x2="640" y2="248" class="divider"/>
  <text class="section" x="340" y="266" text-anchor="middle">Dataset characteristics</text>

  <!-- Stat boxes -->
  <rect x="40"  y="278" width="130" height="36" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
  <text class="stat" x="105" y="301" text-anchor="middle" fill="#2C2C2A">1,499 rows loaded</text>

  <rect x="188" y="278" width="130" height="36" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
  <text class="stat" x="253" y="301" text-anchor="middle" fill="#2C2C2A">3 months of data</text>

  <rect x="336" y="278" width="144" height="36" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
  <text class="stat" x="408" y="301" text-anchor="middle" fill="#2C2C2A">47 Kenyan counties</text>

  <rect x="498" y="278" width="142" height="36" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
  <text class="stat" x="569" y="301" text-anchor="middle" fill="#2C2C2A">6 analytics queries</text>
</svg>
